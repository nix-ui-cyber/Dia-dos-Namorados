<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folioscópio Dia dos Namorados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="headline-container">
        <div id="shine">Feliz Dia dos Namorados <span id="emoji">💞</span></div>
    </div>

    <div class="gallery">
        <img src="IMG/1000060465.jpg" alt="Um casal se abraçando">
        <img src="IMG/1000074655.jpg" alt="Casal mostrando suas alianças">
        <img src="IMG/1000077361.jpg" alt="Casal tirando uma selfie sorrindo">
        <img src="IMG/1000086212.jpg" alt="Casal tiando selfie juntos">
        <img src="IMG/1000091553.jpg" alt="Casal tirando selfie usando filtro de cachorro do Instagram">
        <img src="IMG/1000091555.jpg" alt="Casal tirando selfie com expressão facial engraçada">
        <img src="IMG/1000101924.jpg" alt="Homem tirando selfie com a mão da namorada no rosto dele">
        <img src="IMG/100108936.jpg" alt="Foto de casal com tênis e calça combinando">
        <img src="IMG/1000077359.jpg" alt="Um casal lado a lado">
        <img src="IMG/1000086167.jpg" alt="Um casal sorrindo juntos">
        <img src="IMG/1000086207.jpg" alt="Comparação entre a cor do cabelo de um casal">
        <img src="IMG/1000102577.jpg" alt="Um casal em lados opostos">
    </div>

    <div id="music-btn-container">
        <button id="music-btn" onclick="startMusic()">▶ Tocar música 💕</button>
    </div>

    <audio id="music" loop>
        <source src="IMG/loving-machine.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startMusic() {
            const audio = document.getElementById('music');
            audio.play();

            const btn = document.getElementById('music-btn-container');
            btn.style.opacity = '0';
            setTimeout(() => btn.style.display = 'none', 800);
        }
    </script>

</body>
</html>
