<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folioscópio Dia dos Namorados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="headline-container">
        <div id="shine">Feliz Dia dos Namorados <span id="emoji">💞</span></div>
    </div>

    <div class="gallery">
        <img src="IMG/1000060465.jpg" alt="Um casal se abraçando">
        <img src="IMG/1000077359.jpg" alt="Um casal lado a lado">
        <img src="IMG/1000086167.jpg" alt="Um casal sorrindo juntos">
        <img src="IMG/1000086207.jpg" alt="Comparação entre a cor do cabelo de um casal">
        <img src="IMG/1000102577.jpg" alt="Um casal em lados opostos">
    </div>

    <div id="music-btn-container">
        <button id="music-btn" onclick="startMusic()">▶ Tocar música 💕</button>
    </div>

    <iframe 
        id="music"
        style="display:none; width:0; height:0; border:0"
        allow="autoplay">
    </iframe>

    <script>
        function startMusic() {
            const iframe = document.getElementById('music');
            iframe.src = "https://www.youtube.com/embed/5tpQaCAq6Qc?autoplay=1&loop=1&playlist=5tpQaCAq6Qc&controls=0&showinfo=0&mute=0";
            
            const btn = document.getElementById('music-btn-container');
            btn.style.opacity = '0';
            setTimeout(() => btn.style.display = 'none', 800);
        }
    </script>

</body>
</html>
